<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f2f5f9;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            width: 70%;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .2);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }

        button {
            grid-column: span 2;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
        }

        button:hover {
            background: #0056b3;
        }

        h2 {
            text-align: center;
            color: green;
            margin-top: 25px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1> Student Performance Predictor</h1>

        <form action="/predict" method="POST">

            <input type="number" name="Hours_Studied" placeholder="Hours Studied" required>

            <input type="number" name="Attendance" placeholder="Attendance (%)" required>

            <select name="Parental_Involvement" required>
                <option value="">Parental Involvement</option>
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>

            <select name="Access_to_Resources" required>
                <option value="">Access to Resources</option>
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>

            <select name="Extracurricular_Activities" required>
                <option value="">Extracurricular Activities</option>
                <option>Yes</option>
                <option>No</option>
            </select>

            <input type="number" name="Sleep_Hours" placeholder="Sleep Hours" required>

            <input type="number" name="Previous_Scores" placeholder="Previous Scores" required>

            <select name="Motivation_Level" required>
                <option value="">Motivation Level</option>
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>

            <select name="Internet_Access" required>
                <option value="">Internet Access</option>
                <option>Yes</option>
                <option>No</option>
            </select>

            <input type="number" name="Tutoring_Sessions" placeholder="Tutoring Sessions" required>

            <select name="Family_Income" required>
                <option value="">Family Income</option>
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>

            <select name="Teacher_Quality" required>
                <option value="">Teacher Quality</option>
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>

            <select name="School_Type" required>
                <option value="">School Type</option>
                <option>Public</option>
                <option>Private</option>
            </select>

            <select name="Peer_Influence" required>
                <option value="">Peer Influence</option>
                <option>Negative</option>
                <option>Neutral</option>
                <option>Positive</option>
            </select>

            <input type="number" name="Physical_Activity" placeholder="Physical Activity" required>

            <select name="Learning_Disabilities" required>
                <option value="">Learning Disabilities</option>
                <option>Yes</option>
                <option>No</option>
            </select>

            <select name="Parental_Education_Level" required>
                <option value="">Parental Education Level</option>
                <option>High School</option>
                <option>College</option>
                <option>Postgraduate</option>
            </select>

            <select name="Distance_from_Home" required>
                <option value="">Distance from Home</option>
                <option>Near</option>
                <option>Moderate</option>
                <option>Far</option>
            </select>

            <select name="Gender" required>
                <option value="">Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>

            <button type="submit">
                Predict Exam Score
            </button>

        </form>
        <h2>{{ prediction_text }}</h2>


    </div>

</body>

</html>
